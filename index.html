<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Մաթեմատիկական Խնդիրների Օգնական</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #eef3f8;
}

/* FLEX LAYOUT */
body {
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  text-align: center;
  background: linear-gradient(135deg, #4facfe, #00c6ff);
  color: white;
  padding: 25px;
  font-size: 30px;
  font-weight: 700;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* GRID */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  width: 90%;
  max-width: 1100px;
}

/* CARDS */
.card, .main-card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  border: 2px solid #dbe7f3;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.main-card {
  grid-column: 1 / -1;
  max-width: 600px;
  margin: auto;
}

.card:hover, .main-card:hover {
  transform: translateY(-5px);
}

/* SUMMARY */
summary {
  font-size: 18px;
  font-weight: 600;
  color: #1565c0;
  cursor: pointer;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 11px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #1976d2;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #0d47a1;
}

/* RESULT */
.result {
  margin-top: 10px;
  padding: 10px;
  background: #e3f2fd;
  border-radius: 8px;
}

/* RADIO */
.radio-label {
  display: block;
}

/* HIDDEN */
.hidden { display: none; }

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  color: #666;
}
</style>
</head>

<body>

<header onclick="location.reload()">🚀 Խնդիրների Հաշվիչ</header>

<div class="main">
  <div class="dashboard">

    <!-- Շարժում -->
    <details class="main-card">
      <summary>🚗 Շարժման խնդիրներ</summary>

      <input id="S" placeholder="Ճանապարհ (S)">
      <input id="v" placeholder="Արագություն (v)">
      <input id="t" placeholder="Ժամանակ (t)">

      <button onclick="calcMotion()">Հաշվել</button>
      <div class="result" id="motionResult"></div>
    </details>

    <!-- Երկու մարմին -->
    <details class="card">
      <summary>🔄 Երկու մարմնի շարժում</summary>

      <label class="radio-label"><input type="radio" name="motionTypeRadio" value="opposite" checked> Հանդիպակաց շարժում</label>
      <label class="radio-label"><input type="radio" name="motionTypeRadio" value="same"> Նույն ուղղությամբ</label>
      <label class="radio-label"><input type="radio" name="motionTypeRadio" value="delayed"> Ուշացումով</label>

      <div id="inputsOppSame">
        <input id="S2" placeholder="Հեռավորություն (S)">
        <input id="v1" placeholder="Առաջին արագություն v₁">
        <input id="v2" placeholder="Երկրորդ արագություն v₂">
      </div>

      <div id="inputsDelayed" class="hidden">
        <input id="v1_delay" placeholder="Առաջին արագություն v₁">
        <input id="v2_delay" placeholder="Երկրորդ արագություն v₂">
        <input id="t_delay" placeholder="Ուշացում (ժ)">
      </div>

      <button onclick="calcDoubleMotion()">Հաշվել</button>
      <div class="result" id="motion2Result"></div>
    </details>

    <!-- Տոկոս -->
    <details class="card">
      <summary>💰 Տոկոսների խնդիրներ</summary>

      <input id="num" placeholder="Թիվ">
      <input id="percent" placeholder="Տոկոս (%)">

      <button onclick="calcPercent()">Հաշվել</button>
      <div class="result" id="percentResult"></div>
    </details>

    <!-- Մաս -->
    <details class="card">
      <summary>🍎 Մասերի խնդիրներ</summary>

      <input id="whole" placeholder="Ամբողջ թիվ">
      <input id="fraction" placeholder="օր. 2/5">

      <button onclick="calcFraction()">Հաշվել</button>
      <div class="result" id="fractionResult"></div>
    </details>

    <!-- Գործողություններ -->
    <details class="card">
      <summary>🔢 Պարզ գործողություններ</summary>

      <input id="n1" placeholder="Թիվ 1">
      <input id="n2" placeholder="Թիվ 2">

      <select id="op">
        <option value="+">+</option>
        <option value="-">−</option>
        <option value="*">×</option>
        <option value="/">÷</option>
      </select>

      <button onclick="calcBasic()">Հաշվել</button>
      <div class="result" id="basicResult"></div>
    </details>

  </div>
</div>

<footer>© Նախագծային աշխատանք</footer>

<script>
// Շարժում
function calcMotion(){
let S=parseFloat(document.getElementById("S").value);
let v=parseFloat(document.getElementById("v").value);
let t=parseFloat(document.getElementById("t").value);

if(!isNaN(S)&&!isNaN(v)&&isNaN(t))
motionResult.innerHTML=`t=${(S/v).toFixed(2)} ժ`;
else if(!isNaN(S)&&!isNaN(t)&&isNaN(v))
motionResult.innerHTML=`v=${(S/t).toFixed(2)} կմ/ժ`;
else if(!isNaN(v)&&!isNaN(t)&&isNaN(S))
motionResult.innerHTML=`S=${(v*t).toFixed(2)} կմ`;
else
motionResult.innerHTML="Լրացրեք ճիշտ 2 տվյալ";
}

// Երկու մարմին
function calcDoubleMotion(){
let type=document.querySelector('input[name="motionTypeRadio"]:checked').value;

if(type==="opposite"){
motion2Result.innerHTML=(S2.value/(v1.value*1+v2.value*1)).toFixed(2);
}
else if(type==="same"){
motion2Result.innerHTML=(S2.value/Math.abs(v1.value-v2.value)).toFixed(2);
}
else{
motion2Result.innerHTML=((v1_delay.value*t_delay.value)/(v2_delay.value-v1_delay.value)).toFixed(2);
}
}

// toggle
document.querySelectorAll('input[name="motionTypeRadio"]').forEach(r=>{
r.addEventListener("change",()=>{
inputsOppSame.classList.add("hidden");
inputsDelayed.classList.add("hidden");

if(r.value==="delayed")
inputsDelayed.classList.remove("hidden");
else
inputsOppSame.classList.remove("hidden");
});
});

// տոկոս
function calcPercent(){
percentResult.innerHTML=(num.value*percent.value/100).toFixed(2);
}

// մաս
function calcFraction(){
let f=fraction.value.split("/");
fractionResult.innerHTML=(whole.value*f[0]/f[1]).toFixed(2);
}

// գործողություններ
function calcBasic(){
let a=parseFloat(n1.value);
let b=parseFloat(n2.value);
let o=op.value;

if(isNaN(a)||isNaN(b)){
basicResult.innerHTML="Լրացրեք";
return;
}

let r= o=="+"?a+b: o=="-"?a-b: o=="*"?a*b:(b!==0? a/b:"0-ով չի կարելի");
basicResult.innerHTML=r;
}
</script>

</body>
</html>
