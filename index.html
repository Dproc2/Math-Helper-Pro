<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Մաթեմատիկական և Ֆիզիկայի Օգնական</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --secondary: #3b82f6;
            --border-color: #1e40af;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(30, 64, 175, 0.2);
            cursor: pointer;
            border-bottom: 5px solid #1d4ed8;
        }

        header h1 { margin: 0; font-size: 2rem; font-weight: 800; text-transform: uppercase; }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 3px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        summary {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            list-style: none;
            padding: 10px;
            text-align: center;
            border-bottom: 1px dashed #cbd5e1;
        }

        .scratch-link {
            display: block;
            background: #ffab19;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        label { display: block; font-size: 0.8rem; font-weight: 600; margin-top: 10px; color: #475569; }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            margin-top: 5px;
        }

        .calc-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 10px;
            font-weight: 700;
            color: #1e40af;
            text-align: center;
        }

        .formula-text {
            display: block;
            font-size: 0.8rem;
            font-style: italic;
            color: #64748b;
            font-weight: 400;
            margin-top: 5px;
        }

        .radio-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .radio-label { font-size: 0.75rem; background: #eef2ff; padding: 5px; border-radius: 5px; cursor: pointer; }

        footer { text-align: center; padding: 30px; color: #64748b; margin-top: auto; }

        @media (max-width: 1024px) { .container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header onclick="location.reload()">
    <h1>ՖԻԶԻԿԱՅԻ ԵՎ ՄԱԹԵՄԱՏԻԿԱՅԻ ՀԱՇՎԻՉ 🚀</h1>
</header>

<div class="container">

    <details class="card" id="card1">
        <summary onclick="resetCard('card1')">🚗 Շարժում (S, v, t)</summary>
        <label>Ճանապարհ (S) կմ</label>
        <input type="number" id="S" placeholder="S">
        <label>Արագություն (v) կմ/ժ</label>
        <input type="number" id="v" placeholder="v">
        <label>Ժամանակ (t) ժամ</label>
        <input type="number" id="t" placeholder="t">
        <button class="calc-btn" onclick="calcMotion()">Հաշվել</button>
        <div class="result" id="motionResult">-</div>
    </details>

    <details class="card" id="card2">
        <summary onclick="resetCard('card2')">🔄 Երկու մարմնի շարժում</summary>
        <div class="radio-group">
            <label class="radio-label"><input type="radio" name="mType" value="opposite" checked onchange="toggleLateField()"> Հանդիպակաց</label>
            <label class="radio-label"><input type="radio" name="mType" value="same" onchange="toggleLateField()"> Նույն ուղղ.</label>
            <label class="radio-label"><input type="radio" name="mType" value="late" onchange="toggleLateField()"> Ուշ մեկնարկ</label>
        </div>
        <div id="late-field" style="display:none;">
            <label>Ուշացում (ժամ)</label>
            <input type="number" id="t_delay" placeholder="t_ուշ">
        </div>
        <input type="number" id="S2" placeholder="Հեռավորություն (S)" style="margin-top:10px;">
        <input type="number" id="v1" placeholder="Արագություն v₁" style="margin-top:10px;">
        <input type="number" id="v2" placeholder="Արագություն v₂" style="margin-top:10px;">
        <input type="number" id="t2" placeholder="Ժամանակ (t)" style="margin-top:10px;">
        <button class="calc-btn" onclick="calcDoubleMotion()">Հաշվել</button>
        <div class="result" id="motion2Result">-</div>
    </details>

    <details class="card" id="card3">
        <summary onclick="resetCard('card3')">💰 Տոկոսներ</summary>
        <a href="https://scratch.mit.edu/projects/1307453213" target="_blank" class="scratch-link">🦊 Scratch Տոկոսներ</a>
        <select id="percentMode">
            <option value="of">Գտնել թվի տոկոսը</option>
            <option value="find">Գտնել թիվը ըստ %-ի</option>
        </select>
        <input type="number" id="num" placeholder="Թիվ" style="margin-top:10px;">
        <input type="number" id="percent" placeholder="%" style="margin-top:10px;">
        <button class="calc-btn" onclick="calcPercent()">Հաշվել</button>
        <div class="result" id="percentResult">-</div>
    </details>

    <details class="card" id="card4">
        <summary onclick="resetCard('card4')">🍎 Մասերի խնդիրներ</summary>
        <select id="fractionMode">
            <option value="of">Գտնել թվի մասը</option>
            <option value="find">Գտնել թիվը ըստ մասի</option>
        </select>
        <input type="number" id="whole" placeholder="Թիվ" style="margin-top:10px;">
        <input type="text" id="fraction" placeholder="օրինակ՝ 3/4" style="margin-top:10px;">
        <button class="calc-btn" onclick="calcFraction()">Հաշվել</button>
        <div class="result" id="fractionResult">-</div>
    </details>

    <a href="https://scratch.mit.edu/projects/1291059748" target="_blank" class="card" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <span style="font-weight:800; color:var(--primary);">🌐 ԿՈՈՐԴԻՆԱՏԱՅԻՆ ՀԱՐԹՈՒԹՅՈՒՆ</span>
        <p style="font-size: 0.8rem; color: #64748b;">Բացել Scratch նախագիծը ✅</p>
    </a>

    <details class="card" id="card5">
        <summary onclick="resetCard('card5')">🔢 Պարզ գործողություններ</summary>
        <input type="number" id="n1" placeholder="Թիվ 1">
        <select id="op" style="margin: 10px 0;">
            <option value="+">+</option>
            <option value="-">−</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>
        <input type="number" id="n2" placeholder="Թիվ 2">
        <button class="calc-btn" onclick="calcBasic()">Հաշվել</button>
        <div class="result" id="basicResult">-</div>
    </details>

</div>

<footer>
    <p>© Նախագծային աշխատանք | Վ․Բախշյանի անվան №2 հիմնական դպրոց</p>
</footer>

<script>
    const formatNum = (n) => {
        let num = parseFloat(n);
        return Number.isInteger(num) ? num : parseFloat(num.toFixed(2));
    };

    const val = (id) => parseFloat(document.getElementById(id).value);

    function resetCard(id) {
        const card = document.getElementById(id);
        card.querySelectorAll('input').forEach(i => i.value = '');
        card.querySelectorAll('.result').forEach(r => r.innerHTML = '-');
        if(id === 'card2') document.getElementById('late-field').style.display = 'none';
    }

    function toggleLateField() {
        const type = document.querySelector('input[name="mType"]:checked').value;
        document.getElementById('late-field').style.display = (type === 'late') ? 'block' : 'none';
    }

    function calcMotion() {
        let s = val('S'), v = val('v'), t = val('t');
        let res = document.getElementById("motionResult");
        if (!isNaN(s) && !isNaN(v) && isNaN(t)) {
            res.innerHTML = `t = ${formatNum(s/v)} ժ <span class="formula-text">t = S / v = ${s} / ${v}</span>`;
        } else if (!isNaN(s) && !isNaN(t) && isNaN(v)) {
            res.innerHTML = `v = ${formatNum(s/t)} կմ/ժ <span class="formula-text">v = S / t = ${s} / ${t}</span>`;
        } else if (!isNaN(v) && !isNaN(t) && isNaN(s)) {
            res.innerHTML = `S = ${formatNum(v*t)} կմ <span class="formula-text">S = v * t = ${v} * ${t}</span>`;
        } else res.innerHTML = "Լրացրեք ճիշտ 2 տվյալ";
    }

    function calcDoubleMotion() {
        let s = val('S2'), v1 = val('v1'), v2 = val('v2'), t = val('t2');
        let type = document.querySelector('input[name="mType"]:checked').value;
        let res = document.getElementById("motion2Result");
        
        if (type === "late") {
            let d = val('t_delay') || 0;
            if (isNaN(v1) || isNaN(v2) || isNaN(t)) return res.innerHTML = "Լրացրեք v1, v2 և t";
            let dist = Math.abs((v1 * t) - (v2 * (t - d)));
            res.innerHTML = `S = ${formatNum(dist)} կմ <span class="formula-text">S = |v1*t - v2*(t-t_ուշ)| = |${v1}*${t} - ${v2}*(${t}-${d})|</span>`;
        } else {
            let vRel = (type === "opposite") ? (v1 + v2) : Math.abs(v1 - v2);
            let sign = (type === "opposite") ? "+" : "-";
            if (!isNaN(vRel) && !isNaN(t) && isNaN(s)) {
                res.innerHTML = `S = ${formatNum(vRel * t)} կմ <span class="formula-text">S = (v1 ${sign} v2) * t</span>`;
            } else if (!isNaN(s) && !isNaN(vRel) && isNaN(t)) {
                res.innerHTML = `t = ${formatNum(s / vRel)} ժ <span class="formula-text">t = S / (v1 ${sign} v2)</span>`;
            } else res.innerHTML = "Լրացրեք անհրաժեշտ տվյալները";
        }
    }

    function calcPercent() {
        let n = val('num'), p = val('percent'), mode = document.getElementById("percentMode").value;
        let res = document.getElementById("percentResult");
        if (isNaN(n) || isNaN(p)) return res.innerHTML = "Մուտքագրեք թվերը";
        let r = (mode === "of") ? (n * p / 100) : (n * 100 / p);
        let f = (mode === "of") ? `${n} * ${p} / 100` : `${n} * 100 / ${p}`;
        res.innerHTML = `${formatNum(r)} <span class="formula-text">${f}</span>`;
    }

    function calcFraction() {
        let w = val('whole'), fStr = document.getElementById("fraction").value, mode = document.getElementById("fractionMode").value;
        let res = document.getElementById("fractionResult");
        if (isNaN(w) || !fStr.includes("/")) return res.innerHTML = "Սխալ կոտորակ";
        let p = fStr.split("/");
        let n = parseFloat(p[0]), d = parseFloat(p[1]);
        let r = (mode === "of") ? (w * n / d) : (w * d / n);
        let f = (mode === "of") ? `(${w} / ${d}) * ${n}` : `(${w} / ${n}) * ${d}`;
        res.innerHTML = `${formatNum(r)} <span class="formula-text">${f}</span>`;
    }

    function calcBasic() {
        let a = val('n1'), b = val('n2'), o = document.getElementById("op").value;
        let res = document.getElementById("basicResult");
        if (isNaN(a) || isNaN(b)) return res.innerHTML = "Մուտքագրեք թվերը";
        let r = (o=="+")?a+b : (o=="-")?a-b : (o=="*")?a*b : (b!==0? a/b : "Error");
        res.innerHTML = `${formatNum(r)} <span class="formula-text">${a} ${o} ${b}</span>`;
    }
</script>
</body>
</html>
