<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Մաթեմատիկական Խնդիրների Օգնական</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: #222;
}

header {
  text-align: center;
  color: white;
  padding: 30px 0;
  font-size: 32px;
  font-weight: 700;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
  padding: 40px;
}

.card, .main-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  color: white;
  transition: 0.3s;
}

.main-card { grid-column: 1 / -1; }

.card:hover, .main-card:hover {
  transform: translateY(-5px);
}

summary {
  font-size: 20px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.result {
  margin-top: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
}

.radio-label {
  display: block;
  margin: 5px 0;
}

.hidden { display: none; }

footer {
  text-align: center;
  color: white;
  margin: 20px;
}
</style>
</head>

<body>

<header>🚀 Խնդիրների Հաշվիչ</header>

<div class="dashboard">

<!-- Շարժում -->
<details class="main-card">
<summary>🚗 Շարժման խնդիրներ</summary>

<input id="S" placeholder="Ճանապարհ (S)">
<input id="v" placeholder="Արագություն (v)">
<input id="t" placeholder="Ժամանակ (t)">

<button onclick="calcMotion()">Հաշվել</button>
<div class="result" id="motionResult"></div>
</details>

<!-- Երկու մարմին -->
<details class="card">
<summary>🔄 Երկու մարմնի շարժում</summary>

<label class="radio-label"><input type="radio" name="motionTypeRadio" value="opposite" checked> Հանդիպակաց շարժում</label>
<label class="radio-label"><input type="radio" name="motionTypeRadio" value="same"> Նույն ուղղությամբ</label>
<label class="radio-label"><input type="radio" name="motionTypeRadio" value="delayed"> Երկրորդը ուշ է մեկնարկել</label>

<div id="inputsOppSame">
<input id="S2" placeholder="Հեռավորություն (S)">
<input id="v1" placeholder="Առաջին արագություն v₁">
<input id="v2" placeholder="Երկրորդ արագություն v₂">
</div>

<div id="inputsDelayed" class="hidden">
<input id="v1_delay" placeholder="Առաջին արագություն v₁">
<input id="v2_delay" placeholder="Երկրորդ արագություն v₂">
<input id="t_delay" placeholder="Ուշացում (ժ)">
</div>

<button onclick="calcDoubleMotion()">Հաշվել</button>
<div class="result" id="motion2Result"></div>
</details>

<!-- Տոկոս -->
<details class="card">
<summary>💰 Տոկոսների խնդիրներ</summary>

<input id="num" placeholder="Թիվ">
<input id="percent" placeholder="Տոկոս (%)">

<button onclick="calcPercent()">Հաշվել</button>
<div class="result" id="percentResult"></div>
</details>

<!-- Մաս -->
<details class="card">
<summary>🍎 Մասերի խնդիրներ</summary>

<input id="whole" placeholder="Ամբողջ թիվ">
<input id="fraction" placeholder="օր. 2/5">

<button onclick="calcFraction()">Հաշվել</button>
<div class="result" id="fractionResult"></div>
</details>

<!-- Գործողություններ -->
<details class="card">
<summary>🔢 Պարզ գործողություններ</summary>

<input id="n1" placeholder="Թիվ 1">
<input id="n2" placeholder="Թիվ 2">

<select id="op">
<option value="+">+</option>
<option value="-">−</option>
<option value="*">×</option>
<option value="/">÷</option>
</select>

<button onclick="calcBasic()">Հաշվել</button>
<div class="result" id="basicResult"></div>
</details>

</div>

<footer>© Նախագծային աշխատանք</footer>

<script>
// Շարժում
function calcMotion() {
let S=parseFloat(document.getElementById("S").value);
let v=parseFloat(document.getElementById("v").value);
let t=parseFloat(document.getElementById("t").value);
let res="";

if(!isNaN(S)&&!isNaN(v)&&isNaN(t))
res=`t = ${(S/v).toFixed(2)} ժ`;
else if(!isNaN(S)&&!isNaN(t)&&isNaN(v))
res=`v = ${(S/t).toFixed(2)} կմ/ժ`;
else if(!isNaN(v)&&!isNaN(t)&&isNaN(S))
res=`S = ${(v*t).toFixed(2)} կմ`;
else
res="Լրացրեք ճիշտ 2 տվյալ";

document.getElementById("motionResult").innerHTML=res;
}

// Երկու մարմին
function calcDoubleMotion(){
let type=document.querySelector('input[name="motionTypeRadio"]:checked').value;
let res="";

if(type==="opposite"||type==="same"){
let S=parseFloat(document.getElementById("S2").value);
let v1=parseFloat(document.getElementById("v1").value);
let v2=parseFloat(document.getElementById("v2").value);

if(isNaN(S)||isNaN(v1)||isNaN(v2)) res="Լրացրեք բոլոր դաշտերը";
else{
let t=(type==="opposite")? S/(v1+v2): S/Math.abs(v1-v2);
res=`Ժամանակ = ${t.toFixed(2)} ժ`;
}
}

else{
let v1=parseFloat(document.getElementById("v1_delay").value);
let v2=parseFloat(document.getElementById("v2_delay").value);
let td=parseFloat(document.getElementById("t_delay").value);

if(isNaN(v1)||isNaN(v2)||isNaN(td)) res="Լրացրեք բոլոր դաշտերը";
else{
let t=(v1*td)/(v2-v1);
res=`Ժամանակ = ${t.toFixed(2)} ժ`;
}
}

document.getElementById("motion2Result").innerHTML=res;
}

// toggle inputs
document.querySelectorAll('input[name="motionTypeRadio"]').forEach(r=>{
r.addEventListener("change",()=>{
document.getElementById("inputsOppSame").classList.add("hidden");
document.getElementById("inputsDelayed").classList.add("hidden");

if(r.value==="delayed")
document.getElementById("inputsDelayed").classList.remove("hidden");
else
document.getElementById("inputsOppSame").classList.remove("hidden");
});
});

// տոկոս
function calcPercent(){
let n=parseFloat(num.value);
let p=parseFloat(percent.value);
if(!isNaN(n)&&!isNaN(p))
percentResult.innerHTML=`${(n*p/100).toFixed(2)}`;
else
percentResult.innerHTML="Լրացրեք";
}

// մաս
function calcFraction(){
let w=parseFloat(whole.value);
let f=fraction.value.split("/");
if(f.length===2){
fractionResult.innerHTML=(w*f[0]/f[1]).toFixed(2);
}else fractionResult.innerHTML="Սխալ մուտք";
}

// գործողություններ
function calcBasic(){
let a=parseFloat(n1.value);
let b=parseFloat(n2.value);
let o=op.value;

if(isNaN(a)||isNaN(b)){basicResult.innerHTML="Լրացրեք";return;}

let r= o=="+"?a+b: o=="-"?a-b: o=="*"?a*b: (b!==0? a/b:"0-ով չի կարելի");
basicResult.innerHTML=r;
}
</script>

</body>
</html>
