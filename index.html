<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ֆիզիկայի Խնդիրների Լուծում</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; direction: arm; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 5px; cursor: pointer; transition: 0.3s; }
        h2:hover { color: #007bff; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        input, select, button { margin: 5px 0; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 15px; padding: 10px; background: #e9ecef; border-left: 5px solid #007bff; font-weight: bold; }
        .formula { font-size: 0.85em; font-style: italic; color: #555; margin-top: 5px; display: block; }
        a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ֆիզիկայի Օգնական</h1>

    <div class="section" id="coord-section">
        <h2 onclick="resetSection('coord-section')">Կոորդինատային հարթություն</h2>
        <p>Անցնել հարթակին՝ <a href="https://scratch.mit.edu/projects/1291059748" target="_blank">Scratch Կոորդինատային Համակարգ</a></p>
    </div>

    <div class="section" id="single-body">
        <h2 onclick="resetSection('single-body')">Մեկ մարմնի շարժում</h2>
        <input type="number" id="v1" placeholder="Արագություն (v) մ/վ">
        <input type="number" id="t1" placeholder="Ժամանակ (t) վ">
        <button onclick="solveSingleBody()">Հաշվել Ճանապարհը</button>
        <div id="res1" class="result"></div>
    </div>

    <div class="section" id="two-bodies">
        <h2 onclick="resetSection('two-bodies')">Երկու մարմնի շարժում</h2>
        <select id="direction">
            <option value="towards">Հանդիպակաց (իրար ընդառաջ)</option>
            <option value="away">Հակառակ ուղղություններով</option>
            <option value="same-late">Մեկը մյուսից ուշ է մեկնարկում (նույն ուղղ.)</option>
        </select>
        <input type="number" id="v2_1" placeholder="Առաջին մարմնի արագություն (v1) մ/վ">
        <input type="number" id="v2_2" placeholder="Երկրորդ մարմնի արագություն (v2) մ/վ">
        <input type="number" id="t2" placeholder="Ժամանակ (t) վ">
        <div id="late-start-container" style="display:none;">
            <input type="number" id="t_delay" placeholder="Ուշացման ժամանակը (վ)">
        </div>
        <button onclick="solveTwoBodies()">Հաշվել Հեռավորությունը</button>
        <div id="res2" class="result"></div>
    </div>
</div>

<script>
    // Բաժինը զրոյացնելու ֆունկցիա
    function resetSection(sectionId) {
        const section = document.getElementById(sectionId);
        const inputs = section.querySelectorAll('input');
        const results = section.querySelectorAll('.result');
        inputs.forEach(input => input.value = '');
        results.forEach(res => res.innerHTML = '');
        if(sectionId === 'two-bodies') {
            document.getElementById('direction').selectedIndex = 0;
            document.getElementById('late-start-container').style.display = 'none';
        }
    }

    // Ցուցադրել ուշացման դաշտը միայն անհրաժեշտության դեպքում
    document.getElementById('direction').addEventListener('change', function() {
        const container = document.getElementById('late-start-container');
        container.style.display = (this.value === 'same-late') ? 'block' : 'none';
    });

    function formatNum(num) {
        return parseFloat(num.toFixed(2));
    }

    function solveSingleBody() {
        let v = parseFloat(document.getElementById('v1').value);
        let t = parseFloat(document.getElementById('t1').value);
        if (isNaN(v) || isNaN(t)) return;

        let s = v * t;
        document.getElementById('res1').innerHTML = 
            `Պատասխան՝ S = ${formatNum(s)} մ` + 
            `<span class="formula">Հաշվարկման բանաձևը՝ S = v * t = ${v} * ${t}</span>`;
    }

    function solveTwoBodies() {
        let v1 = parseFloat(document.getElementById('v2_1').value);
        let v2 = parseFloat(document.getElementById('v2_2').value);
        let t = parseFloat(document.getElementById('t2').value);
        let type = document.getElementById('direction').value;
        let resDiv = document.getElementById('res2');
        let s, formula;

        if (isNaN(v1) || isNaN(v2) || isNaN(t)) return;

        if (type === 'towards') {
            s = (v1 + v2) * t;
            formula = `S = (v1 + v2) * t = (${v1} + ${v2}) * ${t}`;
        } else if (type === 'away') {
            s = (v1 + v2) * t;
            formula = `S = (v1 + v2) * t = (${v1} + ${v2}) * ${t}`;
        } else if (type === 'same-late') {
            let delay = parseFloat(document.getElementById('t_delay').value) || 0;
            // Մարմին 1-ը շարժվում է t ժամանակ, մարմին 2-ը՝ (t - delay)
            let s1 = v1 * t;
            let s2 = v2 * Math.max(0, t - delay);
            s = Math.abs(s1 - s2);
            formula = `S = |v1*t - v2*(t - t_ուշ)| = |${v1}*${t} - ${v2}*(${t}-${delay})|`;
        }

        resDiv.innerHTML = `Պատասխան՝ Հեռավորությունը = ${formatNum(s)} մ` + 
                           `<span class="formula">Հաշվարկման բանաձևը՝ ${formula}</span>`;
    }
</script>

</body>
</html>
